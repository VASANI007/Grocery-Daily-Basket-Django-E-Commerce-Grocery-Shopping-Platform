<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Razorpay Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .payment-card h2 {
            margin-top: 0;
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .payment-card p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            color: white;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-pay {
            background-color: #54C392;
        }

        .btn-cancel {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>Payment in Processing</h2>
        <p>Please click the button below to securely complete your payment.</p>
        <div class="buttons-container">
            <button id="pay-btn" class="btn btn-pay">Pay Now</button>
            <button id="cancel-btn" class="btn btn-cancel" onclick="window.location.href='/abortpayment/{{ order_id }}'">Cancel</button>
        </div>
    </div>

<script>
document.getElementById("pay-btn").onclick = function (e) {
    var options = {
        // TEST/LIVE KEY
        "key": "{{ key }}",
        // AMOUNT IN PAISE
        "amount": "{{ amount }}",
        "currency": "INR",
        "name": "{{ rdata.u_name|default:'Daily Basket' }}",
        "description": "Order Payment",
        "image": "{{ rdata.u_image }}",
        "order_id": "{{ razorpay_order_id }}",
        // PAYMENT SUCCESS
        "handler": function (response) {
            console.log("SUCCESS RESPONSE");
            console.log(response);
            alert("Order Placed Successfully");
            window.location.href = "/";
        },
        // USER DETAILS
        "prefill": {
            "name": "{{ rdata.u_name }}",
            "email": "{{ rdata.u_email }}",
            "contact": "{{ rdata.u_phone }}"
        },
        // THEME
        "theme": {
            "color": "#54C392"
        },
        // ENABLE METHODS
        "method": {
            "upi": true,
            "card": true,
            "netbanking": true,
            "wallet": true,
            "emi": true,
            "paylater": true
        },
        // UPI CONFIG
        "upi": {
            // TRY UPI COLLECT FLOW
            "flow": "collect",
            // EMPTY VPA FIELD
            "vpa": ""
        },
        // MODAL SETTINGS
        "modal": {
            "ondismiss": function () {
                console.log("Popup Closed");
                alert("Payment Cancelled");
                window.location.href = "/abortpayment/{{ order_id }}";
            }
        }
    };
    // CREATE CHECKOUT
    var rzp1 = new Razorpay(options);
    // PAYMENT FAILED
    rzp1.on('payment.failed', function (response){
        console.log("FAILED RESPONSE");
        console.log(response.error);
        alert("Payment Failed");
        window.location.href = "/abortpayment/{{ order_id }}";
    });
    // OPEN PAYMENT WINDOW
    rzp1.open();
    e.preventDefault();
}
</script>
</body>
</html>
